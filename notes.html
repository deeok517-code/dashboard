<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Quick notes</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;min-height:100vh;padding:2rem 1rem;display:flex;flex-direction:column;align-items:center}
  h1{font-size:1.4rem;font-weight:600;color:#1a1a1a;margin-bottom:.2rem}.sub{font-size:13px;color:#999;margin-bottom:.5rem}
  .sync-status{font-size:12px;margin-bottom:1rem;padding:4px 14px;border-radius:999px;display:inline-block}
  .sync-status.loading{background:#fff8e1;color:#a07000}.sync-status.saved{background:#e8f5ee;color:#2d7a4f}.sync-status.saving{background:#e8f0fe;color:#1a5fa8}.sync-status.error{background:#fdecea;color:#c03030}
  .notes-layout{display:grid;grid-template-columns:200px 1fr;gap:14px;width:100%;max-width:760px}
  .notes-sidebar{display:flex;flex-direction:column;gap:8px}
  .new-btn{background:#2d7a4f;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:4px}.new-btn:hover{background:#235f3d}
  .note-item{background:#fff;border:.5px solid #ddd;border-radius:8px;padding:10px 12px;cursor:pointer}
  .note-item:hover,.note-item.active{border-color:#2d7a4f}.note-item.active{background:#f0faf4}
  .note-title{font-size:13px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .note-date{font-size:11px;color:#bbb;margin-top:2px}
  .editor-area{background:#fff;border:.5px solid #ddd;border-radius:12px;padding:1.25rem;display:flex;flex-direction:column;min-height:500px}
  .note-title-input{font-size:16px;font-weight:600;color:#1a1a1a;border:none;outline:none;margin-bottom:12px;font-family:inherit;border-bottom:.5px solid #eee;padding-bottom:10px;background:transparent}
  textarea{flex:1;border:none;outline:none;font-size:14px;color:#333;line-height:1.7;font-family:inherit;resize:none;background:transparent;min-height:400px}
  .editor-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:.5px solid #eee}
  .save-status{font-size:12px;color:#bbb}
  .del-note-btn{background:none;border:none;color:#ddd;cursor:pointer;font-size:13px;font-family:inherit}.del-note-btn:hover{color:#c03030}
  .empty-state{display:flex;align-items:center;justify-content:center;flex:1;color:#ccc;font-size:14px}
  .overlay{position:fixed;inset:0;background:rgba(245,244,240,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-size:15px;color:#999}
  .spinner{width:32px;height:32px;border:3px solid #ddd;border-top-color:#2d7a4f;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="overlay" id="overlay"><div class="spinner"></div>Loading your data…</div>
<h1>Quick notes</h1><p class="sub">Everything saves automatically</p>
<div class="sync-status saved" id="sync-status">✓ Synced</div>
<div class="notes-layout">
  <div class="notes-sidebar"><button class="new-btn" id="new-btn">+ New note</button><div id="notes-list"></div></div>
  <div class="editor-area" id="editor-area"><div class="empty-state">Select a note or create a new one</div></div>
</div>
<script src="sync.js"></script>
<script>
const TOOL='notes';
let notes=[],activeId=null,saveTimer=null,triggerSave;
function setSyncStatus(s){const el=document.getElementById('sync-status');const map={saving:'↑ Saving…',saved:'✓ Synced',error:'⚠ Sync failed',loading:'⟳ Loading…'};el.textContent=map[s]||s;el.className='sync-status '+s;}
function uid(){return Date.now()+Math.random().toString(36).slice(2);}
function fmt(ts){return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function renderSidebar(){
  const list=document.getElementById('notes-list');list.innerHTML='';
  [...notes].sort((a,b)=>b.updated-a.updated).forEach(n=>{
    const div=document.createElement('div');div.className='note-item'+(n.id===activeId?' active':'');
    div.innerHTML=`<div class="note-title">${n.title||'Untitled'}</div><div class="note-date">${fmt(n.updated)}</div>`;
    div.addEventListener('click',()=>{activeId=n.id;renderSidebar();renderEditor();});
    list.appendChild(div);
  });
}
function renderEditor(){
  const area=document.getElementById('editor-area');
  const note=notes.find(n=>n.id===activeId);
  if(!note){area.innerHTML='<div class="empty-state">Select a note or create a new one</div>';return;}
  area.innerHTML=`<input class="note-title-input" id="e-title" value="${(note.title||'').replace(/"/g,'&quot;')}" placeholder="Title…"/><textarea id="e-body" placeholder="Start writing…">${note.body||''}</textarea><div class="editor-footer"><span class="save-status" id="save-status">Synced</span><button class="del-note-btn" id="del-note-btn">Delete note</button></div>`;
  const titleEl=document.getElementById('e-title'),bodyEl=document.getElementById('e-body'),statusEl=document.getElementById('save-status');
  const autosave=()=>{note.title=titleEl.value;note.body=bodyEl.value;note.updated=Date.now();triggerSave();renderSidebar();};
  titleEl.addEventListener('input',autosave);bodyEl.addEventListener('input',autosave);
  document.getElementById('del-note-btn').addEventListener('click',()=>{if(!confirm('Delete this note?'))return;notes=notes.filter(n=>n.id!==activeId);activeId=null;triggerSave();renderSidebar();renderEditor();});
}
document.getElementById('new-btn').addEventListener('click',()=>{
  const note={id:uid(),title:'',body:'',updated:Date.now()};notes.unshift(note);activeId=note.id;triggerSave();renderSidebar();renderEditor();
  setTimeout(()=>document.getElementById('e-title')?.focus(),50);
});
async function init(){
  setSyncStatus('loading');
  try{const d=await cloudLoad(TOOL,[]);notes=Array.isArray(d)?d:[];setSyncStatus('saved');}catch(e){setSyncStatus('error');}
  const ds=makeDebouncedSave(TOOL,()=>notes);
  triggerSave=()=>{setSyncStatus('saving');ds();setTimeout(()=>setSyncStatus('saved'),2000);};
  renderSidebar();document.getElementById('overlay').style.display='none';
}
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1000 Points Savings</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  h1 { font-size: 1.4rem; font-weight: 600; color: #1a1a1a; margin-bottom: 0.2rem; }
  .sub { font-size: 13px; color: #999; margin-bottom: 1.5rem; }
  .sync-status { font-size: 12px; margin-bottom: 1rem; padding: 4px 14px; border-radius: 999px; display: inline-block; }
  .sync-status.loading { background: #fff8e1; color: #a07000; }
  .sync-status.saved { background: #e8f5ee; color: #2d7a4f; }
  .sync-status.saving { background: #e8f0fe; color: #1a5fa8; }
  .sync-status.error { background: #fdecea; color: #c03030; }
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; max-width: 660px; width: 100%; margin-bottom: 1.5rem; }
  .stat { background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 10px 12px; text-align: center; }
  .stat-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 600; color: #1a1a1a; }
  .stat-value.accent { color: #2d7a4f; }
  .progress-bar-wrap { width: 100%; max-width: 660px; background: #e0ded8; border-radius: 999px; height: 10px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-bar { height: 100%; background: #2d7a4f; border-radius: 999px; transition: width 0.3s; }
  .grid { display: grid; grid-template-columns: repeat(20,1fr); gap: 4px; width: 100%; max-width: 660px; margin-bottom: 1.5rem; }
  .sq { aspect-ratio: 1; border-radius: 5px; border: 1.5px solid #c5c2ba; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; color: #bbb; transition: background 0.15s, border-color 0.15s, transform 0.1s; user-select: none; }
  .sq:hover { border-color: #2d7a4f; transform: scale(1.08); }
  .sq.done { background: #2d7a4f; border-color: #2d7a4f; color: transparent; cursor: default; }
  .sq.done:hover { transform: none; }
  .win-msg { display: none; background: #e8f5ee; border: 1px solid #a3d4b8; border-radius: 10px; padding: 12px 24px; color: #1d5c36; font-weight: 600; font-size: 15px; text-align: center; }
  .overlay { position: fixed; inset: 0; background: rgba(245,244,240,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; font-size: 15px; color: #999; }
  .spinner { width: 32px; height: 32px; border: 3px solid #ddd; border-top-color: #2d7a4f; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="overlay" id="overlay"><div class="spinner"></div>Loading your data…</div>

<h1>1000 points savings</h1>
<p class="sub">Click a square to save 5 points</p>
<div class="sync-status saved" id="sync-status">✓ Synced</div>

<div class="stats">
  <div class="stat"><div class="stat-label">Saved</div><div class="stat-value accent" id="s-saved">0</div></div>
  <div class="stat"><div class="stat-label">Remaining</div><div class="stat-value" id="s-left">1000</div></div>
  <div class="stat"><div class="stat-label">Squares</div><div class="stat-value" id="s-sq">0 / 200</div></div>
  <div class="stat"><div class="stat-label">Progress</div><div class="stat-value" id="s-pct">0%</div></div>
</div>
<div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
<div class="grid" id="grid"></div>
<div class="win-msg" id="win-msg">🎉 You saved all 1000 points!</div>

<script src="sync.js"></script>
<script>
const TOOL = 'savings1000';
let state = Array(200).fill(false);
let debouncedSave;

function setSyncStatus(s) {
  const el = document.getElementById('sync-status');
  const map = { saving: '↑ Saving…', saved: '✓ Synced', error: '⚠ Sync failed — data saved locally', loading: '⟳ Loading…' };
  el.textContent = map[s] || s;
  el.className = 'sync-status ' + s;
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < 200; i++) {
    const sq = document.createElement('div');
    sq.className = 'sq' + (state[i] ? ' done' : '');
    sq.textContent = '5';
    sq.addEventListener('click', () => { if (state[i]) return; state[i] = true; sq.classList.add('done'); updateStats(); triggerSave(); });
    grid.appendChild(sq);
  }
}

function updateStats() {
  const done = state.filter(Boolean).length;
  const saved = done * 5;
  const pct = Math.round(done / 200 * 100);
  document.getElementById('s-saved').textContent = saved;
  document.getElementById('s-left').textContent = 1000 - saved;
  document.getElementById('s-sq').textContent = done + ' / 200';
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('win-msg').style.display = done === 200 ? 'block' : 'none';
}

function triggerSave() {
  setSyncStatus('saving');
  debouncedSave();
}

async function init() {
  setSyncStatus('loading');
  try {
    const data = await cloudLoad(TOOL, { state: Array(200).fill(false) });
    state = data.state || Array(200).fill(false);
    setSyncStatus('saved');
  } catch(e) {
    setSyncStatus('error');
  }
  debouncedSave = makeDebouncedSave(TOOL, () => ({ state }));
  // Override to update status
  const orig = debouncedSave;
  debouncedSave = () => {
    setSyncStatus('saving');
    const t = makeDebouncedSave(TOOL, () => ({ state }), 1500);
    t();
    setTimeout(() => setSyncStatus('saved'), 2000);
  };
  buildGrid();
  updateStats();
  document.getElementById('overlay').style.display = 'none';
}

init();
</script>
</body>
</html>

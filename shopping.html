<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Shopping list</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;min-height:100vh;padding:2rem 1rem;display:flex;flex-direction:column;align-items:center}
  h1{font-size:1.4rem;font-weight:600;color:#1a1a1a;margin-bottom:.2rem}.sub{font-size:13px;color:#999;margin-bottom:.5rem}
  .sync-status{font-size:12px;margin-bottom:1rem;padding:4px 14px;border-radius:999px;display:inline-block}
  .sync-status.loading{background:#fff8e1;color:#a07000}.sync-status.saved{background:#e8f5ee;color:#2d7a4f}.sync-status.saving{background:#e8f0fe;color:#1a5fa8}.sync-status.error{background:#fdecea;color:#c03030}
  .wrap{width:100%;max-width:420px}
  .add-form{display:flex;gap:8px;margin-bottom:1rem}
  input[type="text"]{flex:1;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;outline:none;background:#fff}input:focus{border-color:#e67e22}
  .add-btn{background:#e67e22;color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:14px;cursor:pointer;font-family:inherit}.add-btn:hover{background:#ca6f1e}
  .actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .stat{font-size:13px;color:#999}.stat span{font-weight:600;color:#1a1a1a}
  .action-btns{display:flex;gap:8px}.action-btns button{background:none;border:.5px solid #ddd;border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;color:#666}.action-btns button:hover{background:#f0ede8}
  .item{background:#fff;border:.5px solid #ddd;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:6px;cursor:pointer}
  .item.checked{background:#fdf6ec;border-color:#f0c080;opacity:.7}
  .check{width:22px;height:22px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
  .item.checked .check{background:#e67e22;border-color:#e67e22;color:#fff}
  .item-text{flex:1;font-size:14px;color:#1a1a1a}.item.checked .item-text{text-decoration:line-through;color:#aaa}
  .del-btn{background:none;border:none;color:#ddd;cursor:pointer;font-size:18px}.del-btn:hover{color:#c03030}
  .empty{text-align:center;color:#ccc;font-size:13px;padding:2rem 0}
  .overlay{position:fixed;inset:0;background:rgba(245,244,240,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-size:15px;color:#999}
  .spinner{width:32px;height:32px;border:3px solid #ddd;border-top-color:#2d7a4f;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="overlay" id="overlay"><div class="spinner"></div>Loading your data…</div>
<h1>Shopping list</h1><p class="sub">Tap items as you pick them up</p>
<div class="sync-status saved" id="sync-status">✓ Synced</div>
<div class="wrap">
  <div class="add-form"><input type="text" id="f-item" placeholder="Add item…"/><button class="add-btn" id="add-btn">Add</button></div>
  <div class="actions"><div class="stat"><span id="stat-left">0</span> remaining</div><div class="action-btns"><button id="uncheck-all">Uncheck all</button><button id="clear-checked">Remove checked</button><button id="clear-all">Clear all</button></div></div>
  <div id="item-list"></div>
</div>
<script src="sync.js"></script>
<script>
const TOOL='shopping';
let items=[],triggerSave;
function setSyncStatus(s){const el=document.getElementById('sync-status');const map={saving:'↑ Saving…',saved:'✓ Synced',error:'⚠ Sync failed',loading:'⟳ Loading…'};el.textContent=map[s]||s;el.className='sync-status '+s;}
function uid(){return Date.now()+Math.random().toString(36).slice(2);}
function render(){
  document.getElementById('stat-left').textContent=items.filter(i=>!i.checked).length;
  const list=document.getElementById('item-list');
  if(!items.length){list.innerHTML='<div class="empty">Your list is empty</div>';return;}
  list.innerHTML='';
  [...items].sort((a,b)=>a.checked-b.checked).forEach(it=>{
    const div=document.createElement('div');div.className='item'+(it.checked?' checked':'');
    div.innerHTML=`<div class="check">${it.checked?'✓':''}</div><div class="item-text">${it.text}</div><button class="del-btn" data-id="${it.id}">×</button>`;
    div.addEventListener('click',e=>{if(e.target.classList.contains('del-btn'))return;const item=items.find(x=>x.id===it.id);if(item){item.checked=!item.checked;triggerSave();render();}});
    div.querySelector('.del-btn').addEventListener('click',e=>{e.stopPropagation();items=items.filter(x=>x.id!==it.id);triggerSave();render();});
    list.appendChild(div);
  });
}
document.getElementById('add-btn').addEventListener('click',()=>{
  const text=document.getElementById('f-item').value.trim();if(!text)return;
  items.push({id:uid(),text,checked:false});document.getElementById('f-item').value='';triggerSave();render();
});
document.getElementById('f-item').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add-btn').click();});
document.getElementById('uncheck-all').addEventListener('click',()=>{items.forEach(i=>i.checked=false);triggerSave();render();});
document.getElementById('clear-checked').addEventListener('click',()=>{items=items.filter(i=>!i.checked);triggerSave();render();});
document.getElementById('clear-all').addEventListener('click',()=>{if(!confirm('Clear the entire list?'))return;items=[];triggerSave();render();});
async function init(){
  setSyncStatus('loading');
  try{const d=await cloudLoad(TOOL,[]);items=Array.isArray(d)?d:[];setSyncStatus('saved');}catch(e){setSyncStatus('error');}
  const ds=makeDebouncedSave(TOOL,()=>items);
  triggerSave=()=>{setSyncStatus('saving');ds();setTimeout(()=>setSyncStatus('saved'),2000);};
  render();document.getElementById('overlay').style.display='none';
}
init();
</script>
</body>
</html>

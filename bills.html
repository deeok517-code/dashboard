<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill reminders</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f4f0; min-height: 100vh; padding: 2rem 1rem; }
  h1 { font-size: 1.4rem; font-weight: 600; color: #1a1a1a; text-align: center; margin-bottom: 0.2rem; }
  .sub { font-size: 13px; color: #999; text-align: center; margin-bottom: 0.75rem; }
  .sync-status { font-size: 12px; margin-bottom: 1rem; padding: 4px 14px; border-radius: 999px; display: block; text-align: center; }
  .sync-status.loading { background: #fff8e1; color: #a07000; } .sync-status.saved { background: #e8f5ee; color: #2d7a4f; } .sync-status.saving { background: #e8f0fe; color: #1a5fa8; } .sync-status.error { background: #fdecea; color: #c03030; }
  .month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 1.5rem; }
  .month-nav button { background: #fff; border: 0.5px solid #ddd; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 14px; font-family: inherit; }
  .month-nav button:hover { background: #f0ede8; }
  .month-label { font-size: 15px; font-weight: 600; color: #1a1a1a; min-width: 140px; text-align: center; }
  .wrap { max-width: 500px; margin: 0 auto; }
  .progress-bar-wrap { background: #e0ded8; border-radius: 999px; height: 8px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-bar { height: 100%; background: #2d7a4f; border-radius: 999px; transition: width 0.3s; }
  .bill-item { background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; cursor: pointer; }
  .bill-item.paid { background: #f0faf4; border-color: #a3d4b8; }
  .check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid #ccc; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
  .bill-item.paid .check { background: #2d7a4f; border-color: #2d7a4f; color: #fff; }
  .bill-info { flex: 1; }
  .bill-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
  .bill-item.paid .bill-name { text-decoration: line-through; color: #999; }
  .bill-amt { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .del-btn { background: none; border: none; color: #ddd; cursor: pointer; font-size: 18px; }
  .del-btn:hover { color: #c03030; }
  .add-form { background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 1rem; margin-top: 1rem; display: grid; grid-template-columns: 1fr auto auto; gap: 8px; }
  input[type="text"], input[type="number"] { padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; width: 100%; }
  input:focus { border-color: #2d7a4f; }
  .add-btn { background: #2d7a4f; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .add-btn:hover { background: #235f3d; }
  .stat-row { display: flex; justify-content: space-between; font-size: 13px; color: #999; margin-bottom: 10px; }
  .stat-row span { font-weight: 600; color: #1a1a1a; }
  .overlay { position: fixed; inset: 0; background: rgba(245,244,240,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; font-size: 15px; color: #999; }
  .spinner { width: 32px; height: 32px; border: 3px solid #ddd; border-top-color: #2d7a4f; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="overlay" id="overlay"><div class="spinner"></div>Loading your data…</div>
<h1>Bill reminders</h1>
<p class="sub">Track which bills you've paid each month</p>
<div class="sync-status saved" id="sync-status">✓ Synced</div>
<div class="month-nav">
  <button id="prev-btn">&#8592;</button>
  <div class="month-label" id="month-label"></div>
  <button id="next-btn">&#8594;</button>
</div>
<div class="wrap">
  <div class="stat-row">Paid this month: <span id="stat-paid">0 / 0</span></div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
  <div id="bill-list"></div>
  <div class="add-form">
    <input type="text" id="f-name" placeholder="Bill name (e.g. Electricity)" />
    <input type="number" id="f-amt" placeholder="Amount" min="0" style="width:90px" />
    <button class="add-btn" id="add-btn">+ Add</button>
  </div>
</div>
<script src="sync.js"></script>
<script>
const TOOL = 'bills';
let data = { bills: [], paid: {} };
let cur = new Date(); cur.setDate(1);
let triggerSave;
const monthKey = () => cur.getFullYear() + '-' + String(cur.getMonth()+1).padStart(2,'0');
const monthName = () => cur.toLocaleDateString('en-US', {month:'long', year:'numeric'});
function setSyncStatus(s) { const el = document.getElementById('sync-status'); const map = {saving:'↑ Saving…',saved:'✓ Synced',error:'⚠ Sync failed',loading:'⟳ Loading…'}; el.textContent = map[s]||s; el.className='sync-status '+s; }
function render() {
  document.getElementById('month-label').textContent = monthName();
  const mk = monthKey();
  if (!data.paid[mk]) data.paid[mk] = {};
  const paid = data.paid[mk];
  const total = data.bills.length;
  const paidCount = Object.values(paid).filter(Boolean).length;
  document.getElementById('stat-paid').textContent = paidCount + ' / ' + total;
  document.getElementById('prog-bar').style.width = total ? Math.round(paidCount/total*100)+'%' : '0%';
  const list = document.getElementById('bill-list'); list.innerHTML = '';
  data.bills.forEach((b, i) => {
    const isPaid = !!paid[i];
    const div = document.createElement('div'); div.className = 'bill-item' + (isPaid?' paid':'');
    div.innerHTML = `<div class="check">${isPaid?'✓':''}</div><div class="bill-info"><div class="bill-name">${b.name}</div></div><div class="bill-amt">${b.amt?parseFloat(b.amt).toFixed(2):'—'}</div><button class="del-btn" data-i="${i}">×</button>`;
    div.addEventListener('click', e => { if(e.target.classList.contains('del-btn')) return; paid[i]=!paid[i]; triggerSave(); render(); });
    div.querySelector('.del-btn').addEventListener('click', e => { e.stopPropagation(); data.bills.splice(i,1); Object.keys(data.paid).forEach(m=>{const p=data.paid[m];const np={};Object.keys(p).forEach(k=>{if(parseInt(k)<i)np[k]=p[k];else if(parseInt(k)>i)np[parseInt(k)-1]=p[k];});data.paid[m]=np;}); triggerSave(); render(); });
    list.appendChild(div);
  });
}
document.getElementById('add-btn').addEventListener('click', () => {
  const name = document.getElementById('f-name').value.trim(); if(!name) return;
  data.bills.push({name, amt: document.getElementById('f-amt').value});
  document.getElementById('f-name').value=''; document.getElementById('f-amt').value='';
  triggerSave(); render();
});
document.getElementById('prev-btn').addEventListener('click', () => { cur.setMonth(cur.getMonth()-1); render(); });
document.getElementById('next-btn').addEventListener('click', () => { cur.setMonth(cur.getMonth()+1); render(); });
async function init() {
  setSyncStatus('loading');
  try { data = await cloudLoad(TOOL, {bills:[],paid:{}}); if(!data.bills) data.bills=[]; if(!data.paid) data.paid={}; setSyncStatus('saved'); } catch(e) { setSyncStatus('error'); }
  const ds = makeDebouncedSave(TOOL, () => data);
  triggerSave = () => { setSyncStatus('saving'); ds(); setTimeout(()=>setSyncStatus('saved'),2000); };
  render(); document.getElementById('overlay').style.display='none';
}
init();
</script>
</body>
</html>
